<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Unexpected ✨</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#050816;
    display:flex;
    justify-content:center;
    align-items:center;
}

canvas{
    position:fixed;
    inset:0;
}

.glow{
    position:fixed;
    width:300px;
    height:300px;
    border-radius:50%;
    background:radial-gradient(circle,#00ffff55,transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    filter:blur(20px);
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:700px;
    padding:40px;
    text-align:center;

    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:30px;

    box-shadow:
    0 0 40px rgba(0,255,255,.2),
    inset 0 0 20px rgba(255,255,255,.05);

    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-10px);
    }
}

h1{
    font-size:clamp(2.5rem,7vw,5rem);
    background:linear-gradient(90deg,#00ffff,#ff00ff,#00ff99);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradient 5s linear infinite;
}

@keyframes gradient{
    to{
        background-position:300%;
    }
}

p{
    color:#d7e6ff;
    margin-top:15px;
    font-size:1.1rem;
    line-height:1.8;
}

.clock{
    margin-top:25px;
    color:#00ffff;
    font-size:2rem;
    letter-spacing:3px;
    font-weight:bold;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#00c6ff,#7f00ff);
    font-size:1rem;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 30px #00c6ff;
}

.secret{
    margin-top:20px;
    color:#00ff99;
    opacity:0;
    transition:.5s;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="glow"></div>

<div class="card">
    <h1>WAH! 😎</h1>

    <p>
        Agar tum yahan tak aa gaye ho...
        to iska matlab tum code dekhne aaye thay,
        lekin browser ne tumhe ek mini sci-fi universe de diya.
    </p>

    <div class="clock" id="clock">00:00:00</div>

    <button class="btn" onclick="surprise()">
        Don't Click Me 👀
    </button>

    <div class="secret" id="secret"></div>
</div>

<script>
// Live Clock
function updateClock(){
    const now=new Date();
    document.getElementById("clock").innerText=
        now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

// Secret Messages
const msgs=[
"🚀 Future tumhara wait kar raha hai.",
"🤯 Tum expected se zyada awesome ho.",
"💎 Ye button dabana sahi decision tha.",
"👾 Simulation approved.",
"🔥 Bhai, tumhara taste dangerous level ka acha hai."
];

function surprise(){
    const s=document.getElementById("secret");
    s.innerText=msgs[Math.floor(Math.random()*msgs.length)];
    s.style.opacity=1;
}

// Mouse Glow
const glow=document.querySelector(".glow");

window.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
});

// Particle Universe
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

const particles=[];

for(let i=0;i<180;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        vx:(Math.random()-0.5)*0.7,
        vy:(Math.random()-0.5)*0.7
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width) p.vx*=-1;
        if(p.y<0||p.y>canvas.height) p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle="#00ffff";
        ctx.fill();

        particles.forEach(q=>{
            const dx=p.x-q.x;
            const dy=p.y-q.y;
            const d=Math.sqrt(dx*dx+dy*dy);

            if(d<100){
                ctx.beginPath();
                ctx.moveTo(p.x,p.y);
                ctx.lineTo(q.x,q.y);
                ctx.strokeStyle=`rgba(0,255,255,${1-d/100})`;
                ctx.stroke();
            }
        });
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
