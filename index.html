<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#000;
overflow-x:hidden;
color:white;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
position:relative;
}

.hero::before{
content:"";
position:absolute;
width:900px;
height:900px;
background:radial-gradient(circle,#00ffff33,transparent 70%);
filter:blur(80px);
animation:spin 20s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

h1{
font-size:clamp(4rem,12vw,12rem);
background:linear-gradient(
90deg,
#fff,
#00ffff,
#7f5cff,
#fff
);
background-size:300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:shine 8s linear infinite;
}

@keyframes shine{
to{
background-position:300%;
}
}

p{
margin-top:20px;
font-size:1.3rem;
opacity:.8;
}

.btn{
margin-top:40px;
padding:18px 40px;
border-radius:100px;
border:none;
cursor:pointer;
font-size:1rem;
background:white;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.grid{
position:absolute;
inset:0;
background:
linear-gradient(#ffffff08 1px,transparent 1px),
linear-gradient(90deg,#ffffff08 1px,transparent 1px);
background-size:60px 60px;
mask-image:linear-gradient(to bottom,transparent,black);
}
</style>
</head>

<body>

<div class="hero">
<div class="grid"></div>

<h1>NEXUS</h1>

<p>
The future doesn't arrive.
It gets built.
</p>

<button class="btn">
Enter The Future
</button>

</div>

</body>
</html>
